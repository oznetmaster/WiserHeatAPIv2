name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore WiserHeatAPIv2.sln

      - name: Build
        run: dotnet build WiserHeatAPIv2.sln --configuration Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Pack library
        run: dotnet pack WiserHeatAPIv2/WiserHeatAPIv2.csproj --configuration Release --no-build -p:ContinuousIntegrationBuild=true -o ${{ github.workspace }}/artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ${{ github.workspace }}/artifacts/*.nupkg
          if-no-files-found: error
